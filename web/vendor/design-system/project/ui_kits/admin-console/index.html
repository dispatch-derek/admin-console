<!-- @dsCard group="Admin Console" viewport="1280x720" name="Admin Console" subtitle="Login → Users, Workspaces, Invitations, Event Log — interactive" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Admin Console</title>
<link rel="stylesheet" href="../../styles.css" />
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css" />
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/bold/style.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  html, body { margin: 0; height: 100%; }
  body { background: var(--theme-bg-container); font-family: var(--font-sans); }
  #root { height: 100vh; }
  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,.2); border-radius: 4px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="AdminSidebar.jsx"></script>
<script type="text/babel" src="LoginScreen.jsx"></script>
<script type="text/babel" src="UsersScreen.jsx"></script>
<script type="text/babel" src="WorkspacesScreen.jsx"></script>
<script type="text/babel" src="EventLogScreen.jsx"></script>
<script type="text/babel">
  const { Button, PageHeader } = window.AnythingLLMAdminDesignSystem_4c97b8;

  function InvitesScreen() {
    return (
      <div style={{ display: "flex", flexDirection: "column" }}>
        <PageHeader title="Invitations" description="Create invitation links to onboard new users to your instance. An invite can be used one time."
          action={<Button variant="cta" icon={<i className="ph-bold ph-link" />}>Create Invite Link</Button>} />
        <div style={{ marginTop: 40, display: "flex", flexDirection: "column", alignItems: "center", gap: 12, color: "var(--theme-text-secondary)" }}>
          <i className="ph ph-envelope-simple-open" style={{ fontSize: 40 }} />
          <p style={{ margin: 0, fontSize: 14 }}>No pending invitations. Create a link to get started.</p>
        </div>
      </div>
    );
  }

  function App() {
    const [authed, setAuthed] = React.useState(false);
    const [active, setActive] = React.useState("users");
    if (!authed) return <window.LoginScreen onLogin={() => setAuthed(true)} />;

    const screens = {
      users: <window.UsersScreen />,
      workspaces: <window.WorkspacesScreen />,
      invites: <InvitesScreen />,
      log: <window.EventLogScreen />,
    };
    return (
      <div style={{ display: "flex", height: "100vh", background: "var(--theme-bg-container)" }}>
        <window.AdminSidebar active={active} onNavigate={setActive} />
        <div style={{ flex: 1, margin: "16px 16px 16px 2px", borderRadius: 16, background: "var(--theme-bg-secondary)", overflowY: "auto" }}>
          <div style={{ padding: "24px 50px 24px 24px" }}>
            {screens[active]}
          </div>
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
