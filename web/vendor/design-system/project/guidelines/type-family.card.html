<!-- @dsCard group="Type" viewport="700x180" name="Typeface — Plus Jakarta Sans" subtitle="The single product family, weights 400–700" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--theme-bg-primary); font-family: var(--font-sans); color: #fff; }
  .wrap { padding: 22px; }
  .big { font-size: 46px; font-weight: 700; letter-spacing: -0.02em; line-height: 1; }
  .sub { font-size: 13px; color: var(--theme-text-secondary); margin-top: 6px; }
  .weights { display: flex; gap: 22px; margin-top: 20px; }
  .w { display: flex; flex-direction: column; }
  .w b { font-size: 22px; }
  .w span { font-size: 11px; color: var(--theme-text-secondary); margin-top: 2px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="big">Admin Console</div>
  <div class="sub">Plus Jakarta Sans · the instance-management app for users, workspaces & system settings</div>
  <div class="weights">
    <div class="w"><b style="font-weight:400">Aa</b><span>Regular 400</span></div>
    <div class="w"><b style="font-weight:500">Aa</b><span>Medium 500</span></div>
    <div class="w"><b style="font-weight:600">Aa</b><span>Semibold 600</span></div>
    <div class="w"><b style="font-weight:700">Aa</b><span>Bold 700</span></div>
  </div>
</div>
</body>
</html>
