<!-- @dsCard group="Spacing" viewport="700x150" name="Spacing Scale" subtitle="4px base grid used across the console" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--theme-bg-primary); font-family: var(--font-sans); color: #fff; }
  .wrap { padding: 22px; display: flex; gap: 18px; align-items: flex-end; }
  .u { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .box { background: var(--theme-button-primary); border-radius: 3px; }
  .lab { font-size: 10px; color: var(--theme-text-secondary); font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
<div class="wrap">
  <div class="u"><div class="box" style="width:4px;height:4px"></div><span class="lab">1 · 4</span></div>
  <div class="u"><div class="box" style="width:8px;height:8px"></div><span class="lab">2 · 8</span></div>
  <div class="u"><div class="box" style="width:12px;height:12px"></div><span class="lab">3 · 12</span></div>
  <div class="u"><div class="box" style="width:16px;height:16px"></div><span class="lab">4 · 16</span></div>
  <div class="u"><div class="box" style="width:24px;height:24px"></div><span class="lab">6 · 24</span></div>
  <div class="u"><div class="box" style="width:32px;height:32px"></div><span class="lab">8 · 32</span></div>
  <div class="u"><div class="box" style="width:48px;height:48px"></div><span class="lab">12 · 48</span></div>
</div>
</body>
</html>
