<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--theme-bg-primary); font-family: var(--font-sans); }
  .wrap { padding: 24px; display: flex; gap: 20px; align-items: stretch; }
  .cell { flex: 1; border-radius: 12px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; padding: 20px; box-sizing: border-box; border: 1px dashed rgba(255,255,255,.25); }
  .mark { font-size: 22px; font-weight: 700; letter-spacing: -0.01em; }
  .lab { font-size: 10px; letter-spacing: .04em; text-transform: uppercase; font-weight: 700; color: rgba(255,255,255,.4); }
</style>
</head>
<body>
<div class="wrap">
  <div class="cell">
    <span class="mark" style="color:#fff">Admin Console</span>
    <span class="lab">Plain-type placeholder</span>
  </div>
  <div class="cell">
    <span class="mark" style="color:#fff">AC</span>
    <span class="lab">Monogram placeholder</span>
  </div>
</div>
</body>
</html>
