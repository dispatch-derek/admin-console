<!-- @dsCard group="Type" viewport="700x240" name="Type Scale" subtitle="Hero to micro — the compact admin console scale" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--theme-bg-primary); font-family: var(--font-sans); color: #fff; }
  .wrap { padding: 22px; display: flex; flex-direction: column; gap: 12px; }
  .r { display: flex; align-items: baseline; gap: 16px; }
  .r .t { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .r .m { font-size: 11px; color: var(--theme-text-secondary); font-variant-numeric: tabular-nums; width: 130px; text-align: right; flex-shrink: 0; }
</style>
</head>
<body>
<div class="wrap">
  <div class="r"><div class="t" style="font-size:38px;font-weight:500">Welcome Back</div><div class="m">hero · 38 / 500</div></div>
  <div class="r"><div class="t" style="font-size:20px;font-weight:600">Add user to instance</div><div class="m">h3 · 20 / 600</div></div>
  <div class="r"><div class="t" style="font-size:18px;font-weight:700">Users</div><div class="m">h4 · 18 / 700</div></div>
  <div class="r"><div class="t" style="font-size:14px;font-weight:500">Username</div><div class="m">label · 14 / 500</div></div>
  <div class="r"><div class="t" style="font-size:12px;color:var(--theme-text-secondary)">These are all the accounts on this instance.</div><div class="m">body · 12 / 400</div></div>
  <div class="r"><div class="t" style="font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.02em;color:var(--theme-text-secondary)">Username</div><div class="m">th caps · 12 / 700</div></div>
</div>
</body>
</html>
