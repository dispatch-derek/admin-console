<!-- @dsCard group="Colors" viewport="700x150" name="Brand Cyan" subtitle="The Admin Console accent — primary buttons, CTAs, links" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--theme-bg-primary); font-family: var(--font-sans); }
  .wrap { display: flex; gap: 0; padding: 20px; }
  .sw { flex: 1; height: 96px; border-radius: 8px; margin-right: 10px; display: flex; flex-direction: column; justify-content: flex-end; padding: 8px; box-sizing: border-box; }
  .sw:last-child { margin-right: 0; }
  .name { font-size: 11px; font-weight: 700; color: #0e0f0f; }
  .hex { font-size: 10px; color: rgba(0,0,0,.65); font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
<div class="wrap">
  <div class="sw" style="background:#c2e7fe"><span class="name">cyan-100</span><span class="hex">#C2E7FE</span></div>
  <div class="sw" style="background:#7cd4fd"><span class="name">cta / 300</span><span class="hex">#7CD4FD</span></div>
  <div class="sw" style="background:#46c8ff"><span class="name">primary / 400</span><span class="hex">#46C8FF</span></div>
  <div class="sw" style="background:#36bffa"><span class="name">home / 450</span><span class="hex">#36BFFA</span></div>
  <div class="sw" style="background:#0ba5ec"><span class="name">teal / 500</span><span class="hex">#0BA5EC</span></div>
  <div class="sw" style="background:#065986"><span class="name" style="color:#fff">royal / 700</span><span class="hex" style="color:rgba(255,255,255,.7)">#065986</span></div>
</div>
</body>
</html>
