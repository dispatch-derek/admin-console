<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--theme-bg-primary); font-family: var(--font-sans); color: #fff; }
  .wrap { padding: 20px; display: flex; gap: 14px; }
  .g { flex: 1; height: 100px; border-radius: 10px; display: flex; align-items: flex-end; padding: 10px; box-sizing: border-box; }
  .lab { font-size: 11px; font-weight: 600; }
</style>
</head>
<body>
<div class="wrap">
  <div class="g" style="background:var(--gradient-main)"><span class="lab">main · 180°</span></div>
  <div class="g" style="background:var(--gradient-sidebar)"><span class="lab">sidebar · 90°</span></div>
  <div class="g" style="background:var(--gradient-selected)"><span class="lab">selected · 146°</span></div>
</div>
</body>
</html>
